<div class="page"><div class="card"><h2>Leave Settlements</h2><p>{{message}}</p><label>Leave Type</label><select [(ngModel)]="form.leaveTypeId"><option value="">Select Type</option><option *ngFor="let t of types" [value]="t.id">{{t.name}}</option></select><label>Adjustment Days</label><input type="number" [(ngModel)]="form.adjustmentDays"><label>Reason</label><textarea [(ngModel)]="form.reason"></textarea><br><br><button (click)="save()" [disabled]="!form.leaveTypeId">Save Adjustment</button></div><div class="card"><table><thead><tr><th>Employee</th><th>Type</th><th>Days</th><th>Reason</th><th>Date</th></tr></thead><tbody><tr *ngFor="let s of settlements"><td>{{s.employeeName}}</td><td>{{s.leaveTypeName}}</td><td>{{s.adjustmentDays}}</td><td>{{s.reason}}</td><td>{{s.createdAt | date:'short'}}</td></tr></tbody></table></div></div>
