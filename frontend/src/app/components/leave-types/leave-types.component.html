<div class="page"><div class="card"><h2>Leave Types Management</h2><p>{{message}}</p><div class="grid"><div><label>Name</label><input [(ngModel)]="form.name"></div><div><label>Default Days</label><input type="number" [(ngModel)]="form.defaultDays"></div><div><label>Accrual / Month</label><input type="number" [(ngModel)]="form.accrualRatePerMonth"></div><div><label><input type="checkbox" [(ngModel)]="form.isAccrued"> Is Accrued</label></div></div><br><button (click)="save()">{{editing ? 'Update' : 'Add'}} Type</button> <button class="secondary" (click)="reset()">Clear</button></div><div class="card"><table><thead><tr><th>Name</th><th>Default</th><th>Accrued</th><th>Rate</th><th></th></tr></thead><tbody><tr *ngFor="let t of types"><td>{{t.name}}</td><td>{{t.defaultDays}}</td><td>{{t.isAccrued}}</td><td>{{t.accrualRatePerMonth}}</td><td><button (click)="edit(t)">Edit</button> <button class="danger" (click)="remove(t.id)">Delete</button></td></tr></tbody></table></div></div>
