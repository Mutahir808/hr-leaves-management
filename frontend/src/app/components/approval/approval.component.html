<div class="page"><div class="card"><h2>Leave Approval</h2><p>{{message}}</p><textarea rows="2" [(ngModel)]="comment" placeholder="Optional rejection comment"></textarea><br><br><button [disabled]="!selected.length" (click)="bulkApprove()">Bulk Approve</button> <button class="danger" [disabled]="!selected.length" (click)="bulkReject()">Bulk Reject</button></div><div class="card"><table><thead><tr><th></th><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Action</th></tr></thead><tbody><tr *ngFor="let r of requests"><td><input type="checkbox" (change)="toggle(r.id, $any($event.target).checked)"></td><td>{{r.employeeName}}</td><td>{{r.leaveTypeName}}</td><td>{{r.startDate}} to {{r.endDate}}</td><td>{{r.daysRequested}}</td><td><button (click)="approve(r.id)">Approve</button> <button class="danger" (click)="reject(r.id)">Reject</button></td></tr></tbody></table></div></div>
